<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penilaian Instagram — Ditjen Planologi Kehutanan 2026</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#f5f6f8;color:#1a1a1a;font-size:14px;line-height:1.6}
  .header{background:#1a5c38;color:#fff;padding:1.5rem 2rem}
  .header h1{font-size:18px;font-weight:600;margin-bottom:4px}
  .header p{font-size:13px;opacity:0.8}
  .container{max-width:860px;margin:0 auto;padding:1.5rem 1rem 4rem}
  .top-controls{background:#fff;border-radius:10px;border:1px solid #e2e5ea;padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
  .penilai-label{font-size:13px;font-weight:600;color:#444;white-space:nowrap}
  .penilai-group{display:flex;gap:6px}
  .penilai-btn{padding:6px 16px;border-radius:6px;border:1.5px solid #d0d5dd;background:#fff;color:#555;font-size:13px;cursor:pointer;font-weight:500;transition:all 0.15s}
  .penilai-btn.active{background:#1a5c38;color:#fff;border-color:#1a5c38}
  .progress-info{margin-left:auto;font-size:12px;color:#666;background:#f0f4f0;padding:5px 12px;border-radius:99px;border:1px solid #c8dbc8}
  .akun-card{background:#fff;border-radius:10px;border:1px solid #e2e5ea;margin-bottom:12px;overflow:hidden;transition:box-shadow 0.15s}
  .akun-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.07)}
  .akun-card.done{border-left:4px solid #1a5c38}
  .akun-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #f0f2f5;gap:8px;cursor:pointer;user-select:none}
  .akun-head:hover{background:#fafbfc}
  .akun-no{width:28px;height:28px;border-radius:50%;background:#eaf3ee;color:#1a5c38;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .akun-info{flex:1;min-width:0;margin-left:10px}
  .akun-name{font-size:13px;font-weight:600;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .akun-link{font-size:11px;color:#1a5c38;text-decoration:none;opacity:0.8}
  .akun-link:hover{opacity:1;text-decoration:underline}
  .akun-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .skor-bubble{background:#eaf3ee;color:#1a5c38;font-size:14px;font-weight:700;padding:5px 12px;border-radius:99px;min-width:52px;text-align:center}
  .skor-bubble.empty{background:#f0f2f5;color:#aaa}
  .chevron{font-size:12px;color:#aaa;transition:transform 0.2s}
  .chevron.open{transform:rotate(180deg)}
  .akun-body{padding:16px;display:none}
  .akun-body.open{display:block}
  .kriteria-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px;margin-bottom:14px}
  .krit-item{border:1px solid #e8ebef;border-radius:8px;padding:10px 12px;background:#fafbfc}
  .krit-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
  .krit-name{font-size:12px;font-weight:600;color:#333}
  .krit-bobot{font-size:11px;color:#888;background:#f0f2f5;padding:1px 7px;border-radius:99px}
  .krit-select{width:100%;margin-top:6px;padding:6px 8px;font-size:12px;border:1.5px solid #d0d5dd;border-radius:6px;background:#fff;color:#1a1a1a;cursor:pointer}
  .krit-select:focus{outline:none;border-color:#1a5c38}
  .krit-select.scored{border-color:#1a5c38;background:#eaf3ee}
  .krit-desc{font-size:11px;color:#1a5c38;margin-top:4px;min-height:16px;font-style:italic}
  .panduan-btn{font-size:11px;color:#888;background:none;border:none;cursor:pointer;padding:2px 0;text-decoration:underline}
  .panduan-box{background:#fffbea;border:1px solid #f0e080;border-radius:6px;padding:8px 10px;font-size:11px;color:#6b5700;margin-top:6px;line-height:1.5}
  .follower-section{border-top:1px solid #f0f2f5;padding-top:12px;margin-top:4px}
  .follower-card{background:#eaf3ee;border-radius:8px;padding:10px 14px;display:flex;flex-wrap:wrap;gap:16px;align-items:center}
  .follower-col{flex:1;min-width:120px}
  .follower-col-label{font-size:11px;color:#555;margin-bottom:2px}
  .follower-col-val{font-size:15px;font-weight:700;color:#1a5c38}
  .follower-col-sub{font-size:10px;color:#888;margin-top:1px}
  .skor-pill{background:#1a5c38;color:#fff;border-radius:99px;padding:3px 12px;font-size:13px;font-weight:700;display:inline-block}
  .rubrik-note{font-size:10px;color:#666;line-height:1.5;margin-top:6px}
  .rekap-section{background:#fff;border-radius:10px;border:1px solid #e2e5ea;padding:1.25rem;margin-top:1.5rem}
  .rekap-title{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:12px}
  .rekap-table{width:100%;border-collapse:collapse;font-size:12px}
  .rekap-table th{text-align:left;padding:7px 10px;background:#f5f6f8;color:#666;font-weight:600;border-bottom:2px solid #e2e5ea}
  .rekap-table td{padding:7px 10px;border-bottom:1px solid #f0f2f5;color:#1a1a1a;vertical-align:middle}
  .rekap-table tr:last-child td{border-bottom:none}
  .rank-no{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
  .r1{background:#fef3c7;color:#92400e}
  .r2{background:#f1f5f9;color:#334155}
  .r3{background:#fce7f3;color:#9d174d}
  .rn{background:#f0f2f5;color:#666}
  .skor-high{color:#1a5c38;font-weight:700}
  .skor-mid{color:#7c6500;font-weight:600}
  .skor-low{color:#b91c1c;font-weight:600}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:1rem}
  .btn-export{padding:9px 20px;border-radius:7px;border:none;background:#1a5c38;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
  .btn-export:hover{background:#155030}
  .btn-reset{padding:9px 20px;border-radius:7px;border:1.5px solid #d0d5dd;background:#fff;color:#555;font-size:13px;font-weight:500;cursor:pointer}
  .btn-reset:hover{background:#f5f6f8}
  .toast{position:fixed;bottom:24px;right:24px;background:#1a5c38;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;pointer-events:none;transition:opacity 0.3s;z-index:999}
  .toast.show{opacity:1}
  .progress-bar-outer{height:3px;background:#e2e5ea;border-radius:99px;margin-top:3px}
  .progress-bar-inner{height:3px;background:#1a5c38;border-radius:99px;transition:width 0.3s}
  @media(max-width:600px){.header{padding:1rem}.akun-name{font-size:12px}.kriteria-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <h1>&#127795; Penilaian Akun Instagram — Ditjen Planologi Kehutanan</h1>
  <p>Periode Januari – 15 Juni 2026 &nbsp;|&nbsp; Kementerian Kehutanan</p>
</div>
<div class="container">
  <div class="top-controls">
    <span class="penilai-label">Saya adalah:</span>
    <div class="penilai-group">
      <button class="penilai-btn active" onclick="setPenilai(1)">Penilai 1</button>
      <button class="penilai-btn" onclick="setPenilai(2)">Penilai 2</button>
      <button class="penilai-btn" onclick="setPenilai(3)">Penilai 3</button>
    </div>
    <span class="progress-info" id="prog-text">0 / 26 akun dinilai</span>
  </div>
  <div id="akun-list"></div>
  <div class="rekap-section">
    <div class="rekap-title">&#128202; Rekapitulasi skor (penilai aktif)</div>
    <div style="overflow-x:auto">
      <table class="rekap-table">
        <thead>
          <tr>
            <th style="width:36px">No</th>
            <th>Unit Kerja</th>
            <th style="width:80px;text-align:center">Pertumbuhan</th>
            <th style="width:60px;text-align:center">Skor F</th>
            <th style="width:70px;text-align:center">Total</th>
          </tr>
        </thead>
        <tbody id="rekap-body"></tbody>
      </table>
    </div>
    <div class="btn-row">
      <button class="btn-export" onclick="exportCSV()">&#8681; Ekspor hasil saya (CSV)</button>
      <button class="btn-reset" onclick="resetData()">&#8635; Reset semua skor</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const AKUN=[
  {no:2,nama:"Direktorat Pengukuhan Kawasan Hutan",link:"https://www.instagram.com/dit_pengukuhan_kh",follower:3985,delta:2444},
  {no:3,nama:"Direktorat Inventarisasi dan Pemantauan SDH",link:"https://www.instagram.com/dit_ipsdh/",follower:4123,delta:1519},
  {no:4,nama:"Direktorat Rencana, PKH & Pembentukan WPH",link:"https://www.instagram.com/dit.rpkhpwph/",follower:0,delta:843},
  {no:5,nama:"Direktorat Penggunaan Kawasan Hutan",link:"https://www.instagram.com/ditpkh/",follower:171,delta:26929},
  {no:6,nama:"BPKH Wil. I Medan",link:"https://www.instagram.com/bpkh1medan/",follower:1510,delta:227},
  {no:7,nama:"BPKH Wil. II Palembang",link:"https://www.instagram.com/bpkh2palembang/",follower:2110,delta:232},
  {no:8,nama:"BPKH Wil. III Pontianak",link:"https://www.instagram.com/bpkh3_pontianak/",follower:2516,delta:165},
  {no:9,nama:"BPKH Wil. IV Samarinda",link:"https://www.instagram.com/bpkh4_smd/",follower:1593,delta:144},
  {no:10,nama:"BPKH Wil. V Banjarbaru",link:"https://www.instagram.com/bpkhwilayahv/",follower:2017,delta:2882},
  {no:11,nama:"BPKH Wil. VI Manado",link:"https://www.instagram.com/bpkh6manado/",follower:1562,delta:120},
  {no:12,nama:"BPKH Wil. VII Makassar",link:"https://www.instagram.com/bpkh7makassar/",follower:2306,delta:427},
  {no:13,nama:"BPKH Wil. VIII Denpasar",link:"https://www.instagram.com/bpkhwilayah8/",follower:1619,delta:1181},
  {no:14,nama:"BPKH Wil. IX Ambon",link:"https://www.instagram.com/bpkh9ambon/",follower:1437,delta:191},
  {no:15,nama:"BPKH Wil. X Jayapura",link:"https://www.instagram.com/bpkh10jayapura/",follower:1215,delta:158},
  {no:16,nama:"BPKH Wil. XI Yogyakarta",link:"https://www.instagram.com/bpkhwilayah11/",follower:1553,delta:810},
  {no:17,nama:"BPKH Wil. XII Tanjungpinang",link:"https://www.instagram.com/bpkh12tanjungpinang/",follower:1322,delta:113},
  {no:18,nama:"BPKH Wil. XIII Pangkalpinang",link:"https://www.instagram.com/bpkh13_pangkalpinang/",follower:1369,delta:44},
  {no:19,nama:"BPKH Wil. XIV Kupang",link:"https://www.instagram.com/bpkh14kupang/",follower:2511,delta:114},
  {no:20,nama:"BPKH Wil. XV Gorontalo",link:"https://www.instagram.com/bpkh15gorontalo/",follower:1480,delta:459},
  {no:21,nama:"BPKH Wil. XVI Palu",link:"https://www.instagram.com/bpkhwilayah16palu/",follower:2167,delta:96},
  {no:22,nama:"BPKH Wil. XVII Manokwari",link:"https://www.instagram.com/bpkh17manokwari/",follower:1112,delta:184},
  {no:23,nama:"BPKH Wil. XVIII Aceh",link:"https://www.instagram.com/bpkh.18aceh/",follower:569,delta:284},
  {no:24,nama:"BPKH Wil. XIX Pekanbaru",link:"https://www.instagram.com/bpkh19_official/",follower:1129,delta:334},
  {no:25,nama:"BPKH Wil. XX Bandar Lampung",link:"https://www.instagram.com/bpkh20_bandarlampung/",follower:2877,delta:140},
  {no:26,nama:"BPKH Wil. XXI Palangkaraya",link:"https://www.instagram.com/bpkh21palangkaraya/",follower:2006,delta:311},
  {no:27,nama:"BPKH Wil. XXII Kendari",link:"https://www.instagram.com/bpkh22kendari/",follower:1578,delta:178}
];

const KRITERIA=[
  {id:'estetika',nama:'Konsistensi Estetika',bobot:0.20,
   panduan:'Buka feed Instagram — apakah grid terlihat seragam? Cek penempatan logo di setiap konten, apakah warna tema konsisten, dan apakah font yang digunakan seragam sesuai panduan Biro Humas.',
   rubrik:['','Logo & warna tidak konsisten, belum sesuai panduan','Logo konsisten, warna tampilan tidak konsisten','Logo & warna konsisten, belum sesuai panduan Biro Humas','Logo, font & warna konsisten sesuai panduan','Semua konsisten sesuai panduan + tampilan menarik']},
  {id:'orisinalitas',nama:'Kreativitas & Orisinalitas',bobot:0.20,
   panduan:'Scroll feed Jan–15 Jun 2026. Hitung konten orisinal vs repost. Konten repost biasanya ada watermark atau caption "repost @...". Bandingkan jumlahnya.',
   rubrik:['','Semua repost, tidak ada konten produksi sendiri','Orisinal lebih sedikit dari repost','Orisinal sama banyak dengan repost','Orisinal lebih banyak dari repost','Lebih banyak orisinal + kreatif dalam membuat konten']},
  {id:'gambar',nama:'Kejelasan Gambar/Video',bobot:0.10,
   panduan:'Buka 5–10 konten secara acak. Cek apakah gambar pixelated atau blur, apakah video jernih dan tidak goyang berlebihan. Sesuaikan dengan standar resolusi panduan Biro Humas.',
   rubrik:['','Tidak ada gambar/video yang berkualitas baik','Kualitas baik lebih sedikit dari yang buruk','Kualitas baik sama banyak dengan yang buruk','Kualitas baik lebih banyak dari yang buruk','Seluruh konten resolusi tinggi dan profesional']},
  {id:'copywriting',nama:'Copywriting / Caption',bobot:0.15,
   panduan:'Baca caption 5–10 konten. Cek: apakah menggunakan sapaan "Sobat Hijau"? Apakah hashtag digunakan konsisten? Apakah diksi menarik, edukatif, dan menggunakan emoji secukupnya?',
   rubrik:['','Caption tidak menarik, tidak ada sapaan & hashtag','Caption kurang menarik, sapaan & hashtag tidak konsisten','Menarik & edukatif, tapi sapaan & hashtag tidak konsisten','Menarik & edukatif, konsisten menggunakan sapaan & hashtag','Menarik, ramah, edukatif + emoji, sapaan & hashtag konsisten']},
  {id:'posting',nama:'Konsistensi Jumlah Posting',bobot:0.15,
   panduan:'Hitung total konten orisinal yang diunggah Jan–15 Jun 2026 (bukan repost). Scroll feed dari awal tahun dan hitung.',
   rubrik:['','Hanya repost, tidak ada konten orisinal','Repost + 1–6 konten orisinal','Repost + 7–12 konten orisinal','Repost + 13–24 konten orisinal','Repost + lebih dari 24 konten orisinal']},
  {id:'comment',nama:'Rata-rata Komentar/Postingan',bobot:0.05,
   panduan:'Buka 5–10 postingan, hitung komentar positif di setiap postingan (abaikan spam/bot). Jumlahkan lalu bagi dengan jumlah postingan yang dicek.',
   rubrik:['','Rata-rata 1 komentar positif per postingan','Rata-rata 2 komentar positif per postingan','Rata-rata 3 komentar positif per postingan','Rata-rata 4 komentar positif per postingan','Rata-rata lebih dari 4 komentar positif per postingan']}
];

const BOBOT_FOLLOWER=0.15;

function deltaScore(delta){
  if(delta===null||delta===undefined)return 0;
  if(delta<50)return 1;
  if(delta<=250)return 2;
  if(delta<=500)return 3;
  if(delta<=1000)return 4;
  return 5;
}

let currentPenilai=1;
let scores={};
let openCards=new Set();

function storageKey(){return 'penilaian_ig_2026_p'+currentPenilai;}

function loadData(){
  try{const s=localStorage.getItem(storageKey());scores=s?JSON.parse(s):{};}
  catch(e){scores={};}
}

function saveData(){
  try{localStorage.setItem(storageKey(),JSON.stringify(scores));}catch(e){}
}

function calcTotal(no){
  let s=0;
  KRITERIA.forEach(k=>{s+=(parseInt(scores[no+'_'+k.id])||0)*k.bobot;});
  const a=AKUN.find(a=>a.no===no);
  s+=deltaScore(a?a.delta:null)*BOBOT_FOLLOWER;
  return s;
}

function isDone(no){
  return KRITERIA.every(k=>(parseInt(scores[no+'_'+k.id])||0)>0);
}

function countDone(){return AKUN.filter(a=>isDone(a.no)).length;}

function setPenilai(p){
  currentPenilai=p;
  document.querySelectorAll('.penilai-btn').forEach((b,i)=>b.classList.toggle('active',i+1===p));
  loadData();renderAll();
}

function toggleCard(no){
  if(openCards.has(no))openCards.delete(no);else openCards.add(no);
  const body=document.getElementById('body-'+no);
  const chev=document.getElementById('chev-'+no);
  if(body)body.classList.toggle('open',openCards.has(no));
  if(chev)chev.classList.toggle('open',openCards.has(no));
}

function renderAll(){renderAkunList();renderRekap();document.getElementById('prog-text').textContent=countDone()+' / 26 akun dinilai';}

function renderAkunList(){
  const container=document.getElementById('akun-list');
  container.innerHTML='';
  AKUN.forEach((a,idx)=>{
    const total=calcTotal(a.no);
    const done=isDone(a.no);
    const filled=KRITERIA.filter(k=>(parseInt(scores[a.no+'_'+k.id])||0)>0).length;
    const pct=Math.round(filled/KRITERIA.length*100);
    const isOpen=openCards.has(a.no);
    const ds=deltaScore(a.delta);
    const displayNo=idx+1;

    let html=`<div class="akun-card${done?' done':''}" id="card-${a.no}">
      <div class="akun-head" onclick="toggleCard(${a.no})">
        <div class="akun-no">${displayNo}</div>
        <div class="akun-info">
          <div class="akun-name">${a.nama}</div>
          <div class="progress-bar-outer"><div class="progress-bar-inner" style="width:${pct}%"></div></div>
        </div>
        <div class="akun-right">
          <a href="${a.link}" target="_blank" class="akun-link" onclick="event.stopPropagation()" title="Buka Instagram">&#128279;</a>
          <div class="skor-bubble${total===0?' empty':''}" id="bubble-${a.no}">${total>0?total.toFixed(2):'—'}</div>
          <span class="chevron${isOpen?' open':''}" id="chev-${a.no}">&#9660;</span>
        </div>
      </div>
      <div class="akun-body${isOpen?' open':''}" id="body-${a.no}">
        <div class="kriteria-grid">`;

    KRITERIA.forEach(k=>{
      const val=parseInt(scores[a.no+'_'+k.id])||0;
      html+=`<div class="krit-item">
        <div class="krit-head">
          <span class="krit-name">${k.nama}</span>
          <span class="krit-bobot">${Math.round(k.bobot*100)}%</span>
        </div>
        <button class="panduan-btn" onclick="togglePanduan('pd-${a.no}-${k.id}')">&#9432; lihat panduan</button>
        <div class="panduan-box" id="pd-${a.no}-${k.id}" style="display:none">${k.panduan}</div>
        <select class="krit-select${val>0?' scored':''}" onchange="setScore(${a.no},'${k.id}',this.value)">
          <option value="0"${val===0?' selected':''}>— pilih skor —</option>
          <option value="1"${val===1?' selected':''}>1 – ${k.rubrik[1]}</option>
          <option value="2"${val===2?' selected':''}>2 – ${k.rubrik[2]}</option>
          <option value="3"${val===3?' selected':''}>3 – ${k.rubrik[3]}</option>
          <option value="4"${val===4?' selected':''}>4 – ${k.rubrik[4]}</option>
          <option value="5"${val===5?' selected':''}>5 – ${k.rubrik[5]}</option>
        </select>
        <div class="krit-desc">${val>0?k.rubrik[val]:''}</div>
      </div>`;
    });

    html+=`</div>
        <div class="follower-section">
          <div class="follower-card">
            <div class="follower-col">
              <div class="follower-col-label">Follower saat ini</div>
              <div class="follower-col-val">${(a.follower||0).toLocaleString('id')}</div>
            </div>
            <div class="follower-col">
              <div class="follower-col-label">Pertumbuhan (1 tahun)</div>
              <div class="follower-col-val">+${(a.delta||0).toLocaleString('id')}</div>
            </div>
            <div class="follower-col">
              <div class="follower-col-label">Skor pertumbuhan (bobot 15%)</div>
              <span class="skor-pill">${ds} / 5</span>
            </div>
            <div class="follower-col" style="min-width:160px">
              <div class="rubrik-note">
                &lt;50 = 1 &nbsp;|&nbsp; 50–250 = 2 &nbsp;|&nbsp; 250–500 = 3<br>
                500–1000 = 4 &nbsp;|&nbsp; &gt;1000 = 5
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>`;

    const div=document.createElement('div');
    div.innerHTML=html;
    container.appendChild(div.firstElementChild);
  });
}

function renderRekap(){
  const sorted=AKUN.map((a,idx)=>({idx:idx+1,no:a.no,nama:a.nama,delta:a.delta,ds:deltaScore(a.delta),total:calcTotal(a.no)}))
    .sort((a,b)=>b.total-a.total);
  const tbody=document.getElementById('rekap-body');
  tbody.innerHTML='';
  sorted.forEach((r,i)=>{
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
    const t=r.total;
    const sc=t>=3.5?'skor-high':t>=2.5?'skor-mid':t>0?'skor-low':'';
    tbody.innerHTML+=`<tr>
      <td><span class="rank-no ${rc}">${i+1}</span></td>
      <td style="font-size:12px">${r.nama}</td>
      <td style="text-align:center;font-size:12px">+${(r.delta||0).toLocaleString('id')}</td>
      <td style="text-align:center;font-weight:600;color:#1a5c38">${r.ds}</td>
      <td style="text-align:center" class="${sc}">${t>0?t.toFixed(2):'—'}</td>
    </tr>`;
  });
}

function setScore(no,kid,val){
  scores[no+'_'+kid]=parseInt(val)||0;
  saveData();
  const total=calcTotal(no);
  const done=isDone(no);
  const filled=KRITERIA.filter(k=>(parseInt(scores[no+'_'+k.id])||0)>0).length;
  const pct=Math.round(filled/KRITERIA.length*100);
  const bubble=document.getElementById('bubble-'+no);
  if(bubble){bubble.textContent=total>0?total.toFixed(2):'—';bubble.className='skor-bubble'+(total===0?' empty':'');}
  const card=document.getElementById('card-'+no);
  if(card)card.className='akun-card'+(done?' done':'');
  const prog=document.querySelector('#card-'+no+' .progress-bar-inner');
  if(prog)prog.style.width=pct+'%';
  document.getElementById('prog-text').textContent=countDone()+' / 26 akun dinilai';
  renderRekap();
}

function togglePanduan(id){
  const el=document.getElementById(id);
  if(el)el.style.display=el.style.display==='none'?'block':'none';
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function exportCSV(){
  const rows=[['No','Unit Kerja','Follower','Pertumbuhan','Skor Pertumbuhan','Skor Estetika','Skor Orisinalitas','Skor Gambar/Video','Skor Copywriting','Skor Posting','Skor Comment','Skor Total']];
  AKUN.map((a,idx)=>({
    displayNo:idx+1,no:a.no,nama:a.nama,follower:a.follower,delta:a.delta,ds:deltaScore(a.delta),
    e:parseInt(scores[a.no+'_estetika'])||0,
    o:parseInt(scores[a.no+'_orisinalitas'])||0,
    g:parseInt(scores[a.no+'_gambar'])||0,
    c:parseInt(scores[a.no+'_copywriting'])||0,
    p:parseInt(scores[a.no+'_posting'])||0,
    cm:parseInt(scores[a.no+'_comment'])||0,
    total:calcTotal(a.no)
  })).sort((a,b)=>b.total-a.total).forEach(r=>{
    rows.push([r.displayNo,r.nama,r.follower,r.delta,r.ds,r.e,r.o,r.g,r.c,r.p,r.cm,r.total>0?r.total.toFixed(2):'']);
  });
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='penilaian_instagram_penilai'+currentPenilai+'_2026.csv';
  a.click();
  showToast('File CSV berhasil diunduh!');
}

function resetData(){
  if(!confirm('Reset semua skor Penilai '+currentPenilai+'? Data tidak bisa dikembalikan.'))return;
  scores={};saveData();renderAll();
  showToast('Skor berhasil direset.');
}

loadData();renderAll();
</script>
